########################################
# Basic Configuration
########################################

# main menu navigation
menu:
  - name: home
    url: ""
    icon:
  - name: archives
    url: "archives"
    icon:
  - name: about
    url: "about"
    icon:

mainSections: ["post"]

yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: brain584
email:
description: "少女祈祷中..."
subtitle:
  text: "少女祈祷中..."

banner: "images/banner.webp"
avatar: "images/reimu.png"

toc: true

open_graph:
  enable: true
  options:

excerpt_link: Read More

footer:
  since: 2026
  powered: true
  count: true
  busuanzi: false
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

sidebar:
  position: right
  menu: true
  article:
    show_common: true

social:
  github: https://github.com/brain584

widgets:
  - category
  - tag
  - recent_posts

category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

only_show_capsule_in_index: false
uppercase_capsule: true
show_update_time: false

summary:
  enable: false

rss:
  limit: 10
  showFullContent: false
  showCopyright: false

sort_order:
  taxonomy:
    category: date-reverse
    tag: date-reverse
  archive: date-reverse
  home: default

paginate:
  archive:
  post:

########################################
# CSS
########################################

layout:
  max_width: 1350px

triangle_badge:
  enable: false

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

icon_font: 4552607_ex15nbittbh

font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:

local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  enable: auto

########################################
# Analytics
########################################

baidu_analytics: false
google_analytics: false
clarity: false

########################################
# Markdown Display
########################################

mermaid:
  zoom: false

code_block:
  expand: true

clipboard:
  copyright:
    enable: false

math:
  katex:
    enable: true
  mathjax:
    enable: false

anchor:
  explicit:
    enable: false
  auto:
    enable: false

########################################
# Comment system
########################################

comment:
  default: waline

waline:
  enable: false
  serverURL:

giscus:
  enable: false

########################################
# Search
########################################

algolia_search:
  enable: false

########################################
# Animation
########################################

preloader:
  enable: true
  text:
    zh-CN: 少女祈祷中...
  rotate: true

animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

firework:
  enable: true
  disable_on_mobile: false

########################################
# Extended features
########################################

top:
  enable: true
  position: right
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

outdate:
  enable: false

article_copyright:
  enable: false

sponsor:
  enable: false

share:

home_categories:
  enable: false

pace:
  enable: true

pangu:
  enable: false
